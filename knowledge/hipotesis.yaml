# AthleteTrainLab - Biblioteca de hipótesis v1.1
# Fuente: docs/12-decisiones-de-logica.md (D6)
# Las hipótesis son plantillas. Se activan cuando sus condiciones se cumplen
# y ningún contraindicador está presente. score = Σ puntos positivos de elementos.

hipotesis:
  - codigo: H001
    nombre: Disponibilidad energética / estrategia nutricional insuficiente
    texto: >
      La limitación parece nutricional/energética más que aeróbica: la energía
      disponible durante el esfuerzo no alcanza. Puede ser por no alimentarte lo
      suficiente, o por depender mucho de los carbohidratos y agotar reservas
      antes de tiempo (típico en perfiles delgados que "se apagan" y reviven al
      comer). En ambos casos el motor aeróbico no es el techo.
    elementos: [D001, D002, F001, F002]
    condiciones:
      - {elemento: D001, confianza_minima: media}
    contraindicadores:
      - {elemento: D001, puntos_maximos: -3}
    recomendacion: >
      Ajustar la estrategia de carbohidratos a tu demanda real (a menudo 60-90 g/h,
      más si dependes mucho de ellos) e hidratación; y a medio plazo, construir
      base aeróbica para oxidar mejor la grasa y depender menos del azúcar —
      antes de asumir que te falta fondo aeróbico.
    informacion_faltante:
      - Carbohidratos exactos por hora en el último fondo
      - Si comer revive el rendimiento en ruta
      - Síntomas finales (hambre, sueño, dolor de cabeza)

  - codigo: H002
    nombre: Durabilidad limitada
    texto: >
      El rendimiento cae con el paso de las horas aunque la nutrición sea
      adecuada; la durabilidad parece ser el limitante.
    elementos: [E001, C001, F005]
    condiciones:
      - {elemento: E001, confianza_minima: media}
      - {elemento: D001, confianza_maxima: baja}   # si nutrición explica, gana H001
    recomendacion: >
      Construir durabilidad sobre base aeróbica: volumen progresivo y, sobre
      todo, meter trabajo de fuerza y de calidad al final de las sesiones
      largas (con fatiga previa), para que el rendimiento no se caiga en las
      últimas horas. La fuerza y lo aeróbico van de la mano, no por separado.
    informacion_faltante:
      - Volumen semanal actual y progresión reciente

  - codigo: H003
    nombre: Pacing inadecuado
    texto: >
      La distribución del esfuerzo (salidas fuertes, no regular subidas)
      parece explicar buena parte de la limitación.
    elementos: [F006]
    condiciones:
      - {elemento: F006, confianza_minima: alta}
    recomendacion: >
      Practicar salidas controladas por potencia/RPE y regulación en subidas.
    informacion_faltante:
      - Datos de potencia/ritmo por tercios del esfuerzo

  - codigo: H004
    nombre: Base aeróbica insuficiente
    texto: >
      La evidencia apunta a una capacidad aeróbica por debajo de lo que exige
      el tipo de esfuerzo.
    elementos: [C001, D004, F005]
    condiciones:
      - {elemento: C001, confianza_minima: alta}
    recomendacion: >
      Bloque de base aeróbica con volumen progresivo y control de intensidad.
    informacion_faltante:
      - Frecuencia y duración típica de entrenamientos suaves

  - codigo: H005
    nombre: Limitación glucolítica-oxidativa
    texto: >
      Cuesta sostener intensidades cercanas al umbral; la capacidad
      glucolítica oxidativa parece el limitante.
    elementos: [C002]
    condiciones:
      - {elemento: C002, confianza_minima: alta}
    recomendacion: >
      Trabajo de umbral (intervalos 8-20 min) sobre base aeróbica existente.
    informacion_faltante:
      - Potencia sostenible 20-40 min reciente

  - codigo: H006
    nombre: Déficit explosivo / neuromuscular
    texto: >
      La respuesta a ataques y esfuerzos cortos está limitada por la vía
      anaeróbica aláctica y/o la capacidad neuromuscular.
    elementos: [C003, C005, C004]
    condiciones:
      - {elemento: C003, confianza_minima: media}
    recomendacion: >
      Sprints cortos, arrancadas y trabajo de fuerza-velocidad.
    informacion_faltante:
      - Potencia pico 5-15 s y contexto de los ataques

  - codigo: H007
    nombre: Hidratación / estrés térmico
    texto: >
      El rendimiento cae principalmente en calor. Al sudar mucho pierdes agua y
      sodio y baja tu volumen de plasma: el corazón bombea menos sangre por
      latido, así que el pulso sube para el mismo esfuerzo, cuesta más sostener
      la fuerza y aparece la sensación de "hundirse". Hidratación, reposición de
      sodio y adaptación al calor parecen los limitantes.
    elementos: [F002, D003, F009]
    condiciones:
      - {elemento: D003, confianza_minima: media}
    recomendacion: >
      Bebe según tu tasa de sudoración (pésate antes y después para estimarla) y
      repón sodio, no solo agua: en salidas largas o de calor, una bebida con
      sales sostiene mejor el plasma y el rendimiento que el agua sola. Adáptate
      al calor de forma progresiva. Señal de alarma: si en pleno calor te dan
      escalofríos o piel de gallina, dejas de sudar o te mareas, para y enfríate
      — pueden ser signos de golpe de calor, valóralo con un profesional.
    informacion_faltante:
      - Líquido y sodio por hora, tasa de sudoración estimada

  - codigo: H008
    nombre: Recuperación insuficiente / sobrecarga
    texto: >
      Cuando sientes que no mejoras, muchas veces el cuerpo se adaptó y entró
      en "modo protección": deja de progresar. Para salir hay que variar el
      estímulo — más intensidad si no tienes más tiempo, o más volumen si sí
      lo tienes. Pero en tu caso la recuperación es el punto débil (poco sueño
      y/o estrés alto), y sin recuperación esos cambios no cuajan: entrenas
      pero no asimilas.
    elementos: [F003, F005]
    condiciones:
      - {elemento: F003, confianza_minima: alta}
    recomendacion: >
      Primero endereza la recuperación: prioriza el sueño y baja el estrés
      donde puedas; mete una semana más suave (descarga). Sobre esa base,
      varía el estímulo (más intensidad o más volumen según tu tiempo).
      Recuerda que mejorar es un trípode: nutrición, descanso y entrenamiento
      trabajan juntos; ninguno solo alcanza.
    informacion_faltante:
      - Horas de sueño, HRV o sensación al despertar
      - Distribución de intensidad y días de descanso reales

  - codigo: H015
    nombre: Sobrecarga localizada por técnica o posición
    texto: >
      Una zona concreta se te carga o molesta (típico: el cuádriceps hace
      casi todo el trabajo y el glúteo no participa). Más que un límite
      fisiológico, apunta a la posición en la bici, la técnica de pedaleo o la
      movilidad — y esa sobrecarga acaba limitándote. Pasar muchas horas
      sentado o entrenar casi siempre en rodillo suele agravarlo.
    elementos: [F007]
    condiciones:
      - {elemento: F007, confianza_minima: alta}
    recomendacion: >
      Si no te has hecho un bike fit, hazlo: una posición mal ajustada
      sobrecarga músculos y apaga el glúteo. Trabaja movilidad (cadera,
      isquios) y activación glútea, y revisa la técnica de pedaleo para
      repartir mejor el esfuerzo. Si la molestia duele o persiste, valóralo
      con un fisioterapeuta. Es orientación, no un diagnóstico.
    informacion_faltante:
      - Zona exacta, si te has hecho bike fit y si duele en reposo

  - codigo: H009
    nombre: Entrenamiento sin estructura, siempre en zona media
    texto: >
      El patrón apunta a una distribución de intensidad invertida: casi todo
      el entrenamiento en zona media-fuerte, poca base realmente suave y una
      recuperación que no sostiene la carga. Ninguna pieza está muy mal,
      pero el conjunto limita.
    elementos: [F005, F003, F006, C001]
    condiciones:
      - {elemento: F005, confianza_minima: media}
      - {elemento: F003, confianza_minima: media}
    recomendacion: >
      Reordenar la semana: la mayoría de las salidas realmente suaves (poder
      conversar), una sola sesión de calidad planificada, y proteger el
      sueño. Reevaluar en 6-8 semanas.
    informacion_faltante:
      - Distribución real de zonas en una semana típica
      - Horas de sueño y sensación al despertar

  - codigo: H010
    nombre: Relación peso-potencia limitante en subida
    texto: >
      La evidencia sugiere que la relación entre potencia y peso corporal es
      lo que más penaliza al subir. Subiendo cuenta el peso total, venga de
      grasa o de músculo: la gravedad tira de todos los kilos por igual. Quien
      viene de mucho gimnasio suele cargar masa (sobre todo del tren superior)
      que no aporta potencia al pedaleo, y por eso puede ser fuerte y aun así
      subir con dificultad.
    elementos: [F004, C001]
    condiciones:
      - {elemento: F004, confianza_minima: media}
    contraindicadores:
      - {elemento: F004, puntos_maximos: -3}
    recomendacion: >
      Mejorar los vatios/kg por las dos vías: subir potencia con entrenamiento
      específico de ciclismo y, si procede, ajustar el peso de forma gradual y
      con apoyo profesional. No se trata de perder músculo por perderlo ni de
      comprometer la salud, sino de que la masa que cargas trabaje a tu favor
      en la subida.
    informacion_faltante:
      - Peso y estatura actuales, y su evolución reciente
      - Potencia sostenida en subida (si la mide)

  - codigo: H011
    nombre: Déficit de fuerza
    texto: >
      Las piernas fallan antes que el resto del sistema: la capacidad de
      producir tensión (fuerza) parece el eslabón débil.
    elementos: [C004, C002]
    condiciones:
      - {elemento: C004, confianza_minima: media}
    recomendacion: >
      Trabajo de fuerza 2 veces por semana (básicos multiarticulares) y
      torque en bici con baja cadencia, progresando desde cargas moderadas.
    informacion_faltante:
      - Historial de trabajo de fuerza
      - Tolerancia a baja cadencia medida

  - codigo: H012
    nombre: Entrenamiento poco estructurado, faltan estímulos específicos
    texto: >
      No aparece una limitación fisiológica dominante; tu mayor margen está en
      cómo (y cuánto) entrenas. Entrenar pocos días o sin trabajos específicos
      deja mucho rendimiento sobre la mesa: el cuerpo se adapta a lo que le
      pides, y con poco volumen o siempre el mismo estímulo, deja de mejorar.
    elementos: [F005, C004, C001]
    condiciones:
      - {elemento: F005, confianza_minima: alta}
    recomendacion: >
      Primero, si entrenas pocos días, sube el volumen de forma gradual: añade
      una salida o alarga las que ya haces (sin más de un 10 % por semana) para
      construir base. Luego dale estructura: la mayoría del tiempo en aeróbico
      suave de verdad, uno o dos trabajos de intensidad según tu objetivo y
      fuerza 1-2 veces por semana. Progresión y variedad, no repetir siempre la
      misma salida. Si puedes, un plan o un entrenador acelera mucho esto.
    informacion_faltante:
      - Distribución actual de intensidades en una semana típica
      - Si haces fuerza y con qué frecuencia

  - codigo: H013
    nombre: Respuesta cardíaca individual (probablemente normal)
    texto: >
      Tu pulso alto parece variación individual: a la misma potencia y con
      sensaciones normales, un número de pulsaciones más alto no es de por sí
      un problema. La frecuencia cardíaca es muy personal y no se compara bien
      entre personas.
    elementos: [D005]
    condiciones:
      - {elemento: D005, confianza_minima: media}
    contraindicadores:
      - {elemento: C001, puntos_maximos: -1}   # si hay señales de sobreesfuerzo real, no aplica
    recomendacion: >
      No hace falta obsesionarse con el número. El trabajo aeróbico suave
      (zona 2, conversando) puede bajarlo algo con el tiempo. Como el pulso
      depende de tu fisiología, recomendamos una valoración fisiológica para
      entender tu metabolismo y una revisión cardíaca para confirmar que todo
      está bien — orientación, no diagnóstico.
    informacion_faltante:
      - Valoración fisiológica y cardíaca con un profesional

# Ranking (D6): principal = mayor score; secundarias = score >= 50% del
# principal o confianza media en su elemento núcleo (primera condición).
# H009 es la primera hipótesis combinada (dos condiciones en media, ninguna
# alta): nace del caso revisado el 2026-07-05.
