# AthleteTrainLab - Biblioteca de hipótesis v1.1
# Fuente: docs/12-decisiones-de-logica.md (D6)
# Las hipótesis son plantillas. Se activan cuando sus condiciones se cumplen
# y ningún contraindicador está presente. score = Σ puntos positivos de elementos.

hipotesis:
  - codigo: H001
    nombre: Disponibilidad energética / estrategia nutricional insuficiente
    texto: >
      La limitación parece nutricional/energética más que aeróbica: la energía
      disponible durante el esfuerzo no alcanza. Puede ser por no alimentarte lo
      suficiente, o por depender mucho de los carbohidratos y agotar reservas
      antes de tiempo (típico en perfiles delgados que "se apagan" y reviven al
      comer). En ambos casos el motor aeróbico no es el techo.
    elementos: [D001, D002, F001, F002]
    condiciones:
      - {elemento: D001, confianza_minima: media}
    contraindicadores:
      - {elemento: D001, puntos_maximos: -3}
    recomendacion: >
      Ajustar la estrategia de carbohidratos a tu demanda real (a menudo 60-90 g/h,
      más si dependes mucho de ellos) e hidratación; y a medio plazo, construir
      base aeróbica para oxidar mejor la grasa y depender menos del azúcar —
      antes de asumir que te falta fondo aeróbico.
    informacion_faltante:
      - Carbohidratos exactos por hora en el último fondo
      - Si comer revive el rendimiento en ruta
      - Síntomas finales (hambre, sueño, dolor de cabeza)

  - codigo: H002
    nombre: Durabilidad limitada
    texto: >
      El rendimiento cae con el paso de las horas aunque la nutrición sea
      adecuada; la durabilidad parece ser el limitante.
    elementos: [E001, C001, F005]
    condiciones:
      - {elemento: E001, confianza_minima: media}
      - {elemento: D001, confianza_maxima: baja}   # si nutrición explica, gana H001
    recomendacion: >
      Aumentar volumen aeróbico progresivo y trabajo específico en fatiga.
    informacion_faltante:
      - Volumen semanal actual y progresión reciente

  - codigo: H003
    nombre: Pacing inadecuado
    texto: >
      La distribución del esfuerzo (salidas fuertes, no regular subidas)
      parece explicar buena parte de la limitación.
    elementos: [F006]
    condiciones:
      - {elemento: F006, confianza_minima: alta}
    recomendacion: >
      Practicar salidas controladas por potencia/RPE y regulación en subidas.
    informacion_faltante:
      - Datos de potencia/ritmo por tercios del esfuerzo

  - codigo: H004
    nombre: Base aeróbica insuficiente
    texto: >
      La evidencia apunta a una capacidad aeróbica por debajo de lo que exige
      el tipo de esfuerzo.
    elementos: [C001, D004, F005]
    condiciones:
      - {elemento: C001, confianza_minima: alta}
    recomendacion: >
      Bloque de base aeróbica con volumen progresivo y control de intensidad.
    informacion_faltante:
      - Frecuencia y duración típica de entrenamientos suaves

  - codigo: H005
    nombre: Limitación glucolítica-oxidativa
    texto: >
      Cuesta sostener intensidades cercanas al umbral; la capacidad
      glucolítica oxidativa parece el limitante.
    elementos: [C002]
    condiciones:
      - {elemento: C002, confianza_minima: alta}
    recomendacion: >
      Trabajo de umbral (intervalos 8-20 min) sobre base aeróbica existente.
    informacion_faltante:
      - Potencia sostenible 20-40 min reciente

  - codigo: H006
    nombre: Déficit explosivo / neuromuscular
    texto: >
      La respuesta a ataques y esfuerzos cortos está limitada por la vía
      anaeróbica aláctica y/o la capacidad neuromuscular.
    elementos: [C003, C005, C004]
    condiciones:
      - {elemento: C003, confianza_minima: media}
    recomendacion: >
      Sprints cortos, arrancadas y trabajo de fuerza-velocidad.
    informacion_faltante:
      - Potencia pico 5-15 s y contexto de los ataques

  - codigo: H007
    nombre: Hidratación / estrés térmico
    texto: >
      El rendimiento cae principalmente en calor; hidratación, sodio y
      adaptación térmica parecen los limitantes.
    elementos: [F002, D003, F009]
    condiciones:
      - {elemento: D003, confianza_minima: media}
    recomendacion: >
      Protocolo de hidratación con sodio y exposición progresiva al calor.
    informacion_faltante:
      - Líquido y sodio por hora, tasa de sudoración estimada

  - codigo: H008
    nombre: Recuperación insuficiente
    texto: >
      Fatiga acumulada, sueño o estrés impiden expresar las capacidades
      existentes.
    elementos: [F003]
    condiciones:
      - {elemento: F003, confianza_minima: alta}
    recomendacion: >
      Priorizar sueño y reducir carga 1-2 semanas antes de evaluar de nuevo.
    informacion_faltante:
      - Horas de sueño, HRV o sensación al despertar

  - codigo: H009
    nombre: Entrenamiento sin estructura, siempre en zona media
    texto: >
      El patrón apunta a una distribución de intensidad invertida: casi todo
      el entrenamiento en zona media-fuerte, poca base realmente suave y una
      recuperación que no sostiene la carga. Ninguna pieza está muy mal,
      pero el conjunto limita.
    elementos: [F005, F003, F006, C001]
    condiciones:
      - {elemento: F005, confianza_minima: media}
      - {elemento: F003, confianza_minima: media}
    recomendacion: >
      Reordenar la semana: la mayoría de las salidas realmente suaves (poder
      conversar), una sola sesión de calidad planificada, y proteger el
      sueño. Reevaluar en 6-8 semanas.
    informacion_faltante:
      - Distribución real de zonas en una semana típica
      - Horas de sueño y sensación al despertar

  - codigo: H010
    nombre: Relación peso-potencia limitante en subida
    texto: >
      La evidencia sugiere que la relación entre potencia y peso corporal es
      lo que más penaliza al subir. Subiendo cuenta el peso total, venga de
      grasa o de músculo: la gravedad tira de todos los kilos por igual. Quien
      viene de mucho gimnasio suele cargar masa (sobre todo del tren superior)
      que no aporta potencia al pedaleo, y por eso puede ser fuerte y aun así
      subir con dificultad.
    elementos: [F004, C001]
    condiciones:
      - {elemento: F004, confianza_minima: media}
    contraindicadores:
      - {elemento: F004, puntos_maximos: -3}
    recomendacion: >
      Mejorar los vatios/kg por las dos vías: subir potencia con entrenamiento
      específico de ciclismo y, si procede, ajustar el peso de forma gradual y
      con apoyo profesional. No se trata de perder músculo por perderlo ni de
      comprometer la salud, sino de que la masa que cargas trabaje a tu favor
      en la subida.
    informacion_faltante:
      - Peso y estatura actuales, y su evolución reciente
      - Potencia sostenida en subida (si la mide)

  - codigo: H011
    nombre: Déficit de fuerza
    texto: >
      Las piernas fallan antes que el resto del sistema: la capacidad de
      producir tensión (fuerza) parece el eslabón débil.
    elementos: [C004, C002]
    condiciones:
      - {elemento: C004, confianza_minima: media}
    recomendacion: >
      Trabajo de fuerza 2 veces por semana (básicos multiarticulares) y
      torque en bici con baja cadencia, progresando desde cargas moderadas.
    informacion_faltante:
      - Historial de trabajo de fuerza
      - Tolerancia a baja cadencia medida

# Ranking (D6): principal = mayor score; secundarias = score >= 50% del
# principal o confianza media en su elemento núcleo (primera condición).
# H009 es la primera hipótesis combinada (dos condiciones en media, ninguna
# alta): nace del caso revisado el 2026-07-05.
