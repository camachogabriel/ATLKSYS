# AthleteTrainLab - Preguntas v1.0
# Fuente: docs/07-sistema-de-preguntas.md
# Objetivo Fase 2: 100 preguntas. Aquí están las definidas en la spec.
#
# Esquema por pregunta:
#   codigo, texto, contexto, tipo (contexto|clasificacion|bateria-inicial|afinacion),
#   condiciones_aparicion, respuestas[] (texto, metadatos[], puntos{destino: valor})
#
# Reglas:
# - Toda pregunta debe modificar el estado de conocimiento o activar metadatos útiles.
# - Batería inicial: genera metadatos, no puntos. Afinación: suma/resta puntos.
# - No deben existir dos respuestas con exactamente el mismo efecto.

preguntas:
  # ============ Perfil general (D20) ============
  # Se preguntan una vez al inicio, a todos. Pre-cargan puntos en los factores
  # más comunes para acortar la afinación posterior.
  - codigo: Q073
    texto: ¿Sabes cómo comer e hidratarte durante la práctica del ciclismo?
    contexto: general
    tipo: perfil
    respuestas:
      - id: A
        texto: Sí, muy bien
        metadatos: []
        puntos: {D002: -3}
      - id: B
        texto: Creo saber; no he tenido problemas
        metadatos: []
        puntos: {}
      - id: C
        texto: No, pero no siento que lo necesite
        metadatos: [nutricion, carbohidratos]
        puntos: {D002: 3, D001: 1}
      - id: D
        texto: No, no le presto atención
        metadatos: [nutricion, carbohidratos, hidratacion]
        puntos: {D002: 5, D001: 1}

  - codigo: Q074
    texto: ¿Sigues un plan de entrenamiento?
    contexto: general
    tipo: perfil
    respuestas:
      - id: A
        texto: Sí, con entrenador
        metadatos: [plan-estructurado]
        puntos: {F005: -3}
      - id: B
        texto: Sí, me autoentreno
        metadatos: [plan-estructurado]
        puntos: {F005: -1}
      - id: C
        texto: No, solo trato de hacer lo mejor que puedo
        metadatos: [intensidad]
        puntos: {F005: 3}

  - codigo: Q075
    texto: ¿Sueles llegar descansado y bien dormido a tus entrenamientos?
    contexto: general
    tipo: perfil
    respuestas:
      - id: A
        texto: Sí, duermo bien y llego con energía
        metadatos: []
        puntos: {F003: -3}
      - id: B
        texto: Más o menos, depende de la semana
        metadatos: []
        puntos: {}
      - id: C
        texto: No, suelo dormir poco o llegar cansado
        metadatos: [recuperacion, sueno]
        puntos: {F003: 3}

  - codigo: Q001
    texto: ¿Tienes una estrategia de alimentación para fondos largos?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: No, como cuando tengo hambre
        metadatos: [nutricion, carbohidratos, fondos-largos]
        puntos: {}
      - id: B
        texto: Sí, pero no siempre la cumplo
        metadatos: [nutricion, estrategia-nutricional]
        puntos: {}
      - id: C
        texto: Sí, consumo carbohidratos de forma planificada
        metadatos: [nutricion, carbohidratos]
        puntos: {}

  - codigo: Q005
    texto: ¿Llevas un plan de hidratación en los fondos largos?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: No, tomo cuando tengo sed
        metadatos: [hidratacion]
        puntos: {}
      - id: B
        texto: Sí, pero solo agua
        metadatos: [hidratacion, sodio]
        puntos: {}
      - id: C
        texto: Sí, con electrolitos o sodio
        metadatos: []
        puntos: {}

  - codigo: Q006
    texto: ¿El problema aparece más en días calurosos?
    texto_objetivo: ¿Rindes peor en días calurosos?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: Sí, claramente
        metadatos: [calor, hidratacion]
        puntos: {}
      - id: B
        texto: No noto diferencia
        metadatos: []
        puntos: {}

  - codigo: Q007
    texto: ¿Cómo llegas de descanso a tus fondos largos?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: Duermo mal o llego con fatiga acumulada
        metadatos: [sueno, recuperacion]
        puntos: {}
      - id: B
        texto: Descansado, sueño normal
        metadatos: []
        puntos: {}

  - codigo: Q008
    texto: ¿Cómo administras el esfuerzo durante el fondo?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: Salgo fuerte y aguanto lo que pueda
        metadatos: [pacing]
        puntos: {}
      - id: B
        texto: Controlado, regulo desde el inicio
        metadatos: []
        puntos: {}
      - id: C
        texto: Voy con un grupo más fuerte que yo
        metadatos: [pacing, intensidad]
        puntos: {}

  - codigo: Q009
    texto: En el momento en que "se apaga el motor", ¿qué sientes principalmente?
    texto_objetivo: Al final de los fondos, si el ritmo se te cae, ¿qué notas sobre todo?
    contexto: fondos-largos
    tipo: bateria-inicial
    tipos: [fondo-largo, distribucion-de-esfuerzo]
    respuestas:
      - id: A
        texto: Sin energía, vacío general
        metadatos: [nutricion, carbohidratos, disponibilidad-energetica, durabilidad]
        puntos: {}
      - id: B
        texto: Falta de aire, respiración al límite
        metadatos: [respiracion, intensidad]
        puntos: {}
      - id: C
        texto: Piernas cargadas o ardor muscular
        metadatos: [piernas, fatiga-muscular, fuerza]
        puntos: {}
      - id: D
        texto: Mareo, dolor de cabeza o sed extrema
        metadatos: [hidratacion, sodio, calor]
        puntos: {}
      - id: E
        texto: Ninguna; aguanto bien, solo quiero rendir más
        metadatos: [intensidad, respiracion, fuerza]   # escape: abre rutas para seguir investigando (D16)
        puntos: {}

  - codigo: Q002
    texto: ¿Cuántos gramos de carbohidratos consumes por hora durante un fondo largo?
    tema: Nutrición
    contexto: fondos-largos
    tipo: afinacion
    condiciones_aparicion:
      metadatos_requeridos: [carbohidratos]
    respuestas:
      - id: A
        texto: No consumo
        metadatos: []
        puntos: {D001: 5, E001: 1}   # disponibilidad energética +5, durabilidad +1
      - id: B
        texto: Sí, pero no calculo
        metadatos: []
        puntos: {D002: 3}            # estrategia nutricional +3
      - id: C
        texto: Aproximadamente 30 g/h
        metadatos: []
        puntos: {D001: 3}
      - id: D
        texto: Aproximadamente 60 g/h
        metadatos: []
        puntos: {}
        puntos_condicionales:        # docs/12, D2: "+1 o 0 según contexto"
          - si: {duracion_fondo_h: ">4"}
            puntos: {D001: 1}
      - id: E
        texto: Más de 60 g/h
        metadatos: []
        puntos: {D001: -3}

  - codigo: Q003
    texto: ¿Qué sientes al terminar un fondo largo?
    contexto: fondos-largos
    tipo: afinacion
    condiciones_aparicion:
      metadatos_requeridos: [disponibilidad-energetica]
    respuestas:
      - id: A
        texto: Hambre fuerte y/o sueño
        metadatos: []
        puntos: {D001: 3}
      - id: B
        texto: Piernas vacías pero sin hambre
        metadatos: [fatiga-muscular]
        puntos: {E001: 3, D001: 1}
      - id: C
        texto: Dolor de cabeza o sed extrema
        metadatos: [hidratacion, sodio]
        puntos: {D003: 3}
      - id: D
        texto: Cansancio normal, nada llamativo
        metadatos: []
        puntos: {D001: -1}

  # Discriminador nutricional vs aeróbico (D14): ¿comer revive?
  - codigo: Q060
    texto: Cuando "se te cae la máquina" en un fondo, ¿comer carbohidratos te reactiva de forma clara?
    contexto: fondos-largos
    tipo: afinacion
    condiciones_aparicion:
      metadatos_requeridos: [disponibilidad-energetica]
    respuestas:
      - id: A
        texto: Sí, como y revivo en pocos minutos
        metadatos: [carbohidratos]
        puntos: {D001: 5}
      - id: B
        texto: No mucho, sigo igual de fundido aunque coma
        metadatos: [respiracion]
        puntos: {C001: 3, E001: 1}
      - id: C
        texto: No lo he probado, casi no como en ruta
        metadatos: [nutricion, carbohidratos]
        puntos: {D001: 1}

  - codigo: Q061
    texto: ¿Sientes que dependes mucho de comer para rendir — que si no comes seguido te apagas rápido?
