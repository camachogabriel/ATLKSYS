        puntos: {D001: 3}
      - id: B
        texto: Piernas vacías pero sin hambre
        metadatos: [fatiga-muscular]
        puntos: {E001: 3, D001: 1}
      - id: C
        texto: Dolor de cabeza o sed extrema
        metadatos: [hidratacion, sodio]
        puntos: {D003: 3}
      - id: D
        texto: Cansancio normal, nada llamativo
        metadatos: []
        puntos: {D001: -1}

  # Discriminador nutricional vs aeróbico (D14): ¿comer revive?
  - codigo: Q060
    texto: Cuando "se te cae la máquina" en un fondo, ¿comer carbohidratos te reactiva de forma clara?
    contexto: fondos-largos
    tipo: afinacion
    condiciones_aparicion:
      metadatos_requeridos: [disponibilidad-energetica]
    respuestas:
      - id: A
        texto: Sí, como y revivo en pocos minutos
        metadatos: [carbohidratos]
        puntos: {D001: 5}
      - id: B
        texto: No mucho, sigo igual de fundido aunque coma
        metadatos: [respiracion]
        puntos: {C001: 3, E001: 1}
      - id: C
        texto: No lo he probado, casi no como en ruta
        metadatos: [nutricion, carbohidratos]
        puntos: {D001: 1}

