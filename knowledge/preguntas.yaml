      metadatos_requeridos: [carbohidratos]
    respuestas:
      - id: A
        texto: Sí, necesito comer casi constantemente
        metadatos: []
        puntos: {D001: 3, E001: 1}
      - id: B
        texto: Algo, pero lo llevo
        metadatos: []
        puntos: {D001: 1}
      - id: C
        texto: No, aguanto bastante sin comer
        metadatos: []
        puntos: {D001: -1}

  - codigo: Q004
    texto: ¿Cuánto líquido tomas por hora durante un fondo largo?
