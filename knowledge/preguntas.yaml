        metadatos: []
        puntos: {E001: 1}
      - id: C
        texto: Cada semana
        metadatos: []
        puntos: {E001: -1}

  # --- Ruta piernas / metabólica (H005 requiere C002 alta: Q014A+Q015A = 8) ---
