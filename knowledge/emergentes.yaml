# AthleteTrainLab - Capacidades emergentes v1.2
# Fuente: docs/02-modelo-de-conocimiento.md (sección 9) y docs/12 (D11)
# Manifestaciones funcionales que surgen de la interacción entre capacidades
# y factores. No se entrenan directamente; se mejoran interviniendo sobre sus componentes.
#
# Los emergentes son la CAPA DE RENDIMIENTO OBSERVABLE (D11): aquí viven las
# dimensiones de fitness (velocidad, potencia, resistencias) como resultado,
# no como mecanismo. `depende_de` enumera las capacidades/factores fisiológicos
# que las producen — usado para explicar, no para transferir puntos.

emergentes:
  - codigo: E001
    nombre: Durabilidad
    depende_de: [C001, D001, F005]
  - codigo: E002
    nombre: Economía
    depende_de: [C005, F007]
  - codigo: E003
    nombre: Rendimiento en subida
    depende_de: [C001, C002, F004]
  - codigo: E004
    nombre: Rendimiento en fondos largos
    depende_de: [C001, E001, D001]
  - codigo: E005
    nombre: Rendimiento en contrarreloj
    depende_de: [C002, C001, F006]
  - codigo: E006
    nombre: Recuperación entre esfuerzos
    depende_de: [C001, F003]
  - codigo: E007
    nombre: Potencia
    depende_de: [C004, C005, C003]
  - codigo: E008
    nombre: Velocidad / esprint
    depende_de: [C003, C005, C004]

# Estados derivados usados como destino de puntos en los ejemplos de la spec:
estados_derivados:
  - codigo: D001
    nombre: Disponibilidad energética
    relacionado_con: [F001, F002]
  - codigo: D002
    nombre: Estrategia nutricional
    relacionado_con: [F001]
  - codigo: D003
    nombre: Estrés térmico
    relacionado_con: [F009, F002]
  - codigo: D004
    nombre: Base aeróbica
    relacionado_con: [C001]
