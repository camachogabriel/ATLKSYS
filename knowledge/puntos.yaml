# AthleteTrainLab - Sistema de puntos v1.0
# Fuente: docs/09-sistema-de-puntos.md
# Los puntos representan evidencia acumulada. No son probabilidades ni diagnóstico.

escala:
  5: Evidencia muy fuerte a favor
  3: Evidencia moderada
  1: Evidencia leve
  0: No modifica
  -1: Evidencia leve en contra
  -3: Evidencia moderada en contra
  -5: Evidencia fuerte en contra

# Conversión puntos -> confianza (límites cerrados en docs/12, D8):
confianza:
  - {rango: [null, 3], nivel: baja}
  - {rango: [4, 7], nivel: media}
  - {rango: [8, 12], nivel: alta}
  - {rango: [13, null], nivel: muy-alta}

# Criterio de parada operativo (docs/12, D4):
parada:
  evidencia_suficiente: algún elemento con confianza alta y ninguna pregunta pendiente puede alterar el top-2
  agotamiento: sin preguntas activadas por metadatos activos
  profundidad_maxima: 25
  usuario: puede detenerse en cualquier momento
  resultado_preliminar: si nadie alcanza confianza alta, ofrecer "Afinar mi resultado"

reglas:
  - Fase inicial genera metadatos; fase de afinación suma o resta puntos.
  - Una hipótesis no nace de una sola respuesta, sino del patrón acumulado.
  - El resultado debe mostrar qué respuestas aportaron puntos relevantes.
  - La ausencia de evidencia no es evidencia en contra.
  - No se descarta una hipótesis sin evidencia contradictoria suficiente.
