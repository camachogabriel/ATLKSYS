# Caso de validación MHV-001
# Fuente: docs/10-casos-de-validacion.md

codigo: MHV-001
consulta: Al final de los fondos largos se me apaga el motor
limitacion: LP001

contexto:
  edad: 43
  peso_kg: 80
  estatura_cm: 167
  experiencia: mas de 2 años entrenando
  frecuencia: 2-3 veces por semana

clasificacion:
  - fondo-largo
  - fatiga-al-final
  - posible-subida-al-final

bateria_inicial:
  - Estrategia de alimentación
  - Estrategia de hidratación
  - Clima
  - Sueño
  - Intensidad / pacing
  - Síntomas finales

respuestas_simuladas:
  - No tiene estrategia nutricional
  - Clima normal
  - Durmió bien
  - Se siente exigido desde el inicio de la subida final
  - Termina con hambre y sueño

metadatos_activos:
  - nutricion
  - carbohidratos
  - fondos-largos
  - disponibilidad-energetica
  - pacing
  - durabilidad

# Guion de respuestas para el simulador (flujo completo).
# Refleja las respuestas simuladas de la spec:
respuestas_guion:
  Q001: A   # No tiene estrategia de alimentación
  Q005: B   # Hidratación: solo agua
  Q006: B   # Clima normal
  Q007: B   # Durmió bien
  Q008: A   # Exigido desde el inicio (pacing)
  Q009: A   # Al apagarse: sin energía, vacío general
  Q002: A   # Afinación: no consume carbohidratos
  Q003: A   # Afinación: termina con hambre y sueño
  Q004: B   # Afinación: ~un bidón por hora
  Q010: B   # Pacing: algo más fuerte al inicio (contribuyente, no principal)
  Q011: B   # A veces termina explotado
  Q012: D   # Durabilidad: no sabría decir, nunca come bien en ruta
  Q013: B   # Salidas largas 1-2 veces al mes

afinacion:
  - pregunta: Q002
    respuesta_id: A
    respuesta: No consume o consume muy poco
    puntos: {D001: 5, E001: 1}
  - pregunta: Q003
    respuesta_id: A
    respuesta: Termina con hambre fuerte y sueño
    puntos: {D001: 3}

hipotesis:
  principal: Estrategia nutricional insuficiente para fondos largos
  contribuyentes:
    - Mayor costo energético por composición corporal
    - Posible pacing inadecuado
    - Posible baja durabilidad si se confirma con más evidencia

intervencion_inicial: >
  Diseñar estrategia de carbohidratos e hidratación antes de concluir que la
  limitación principal es baja capacidad aeróbica.
