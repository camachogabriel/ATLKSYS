# AthleteTrainLab - Metadatos v1.0
# Fuente: docs/08-metadatos.md
# Etiquetas que conectan respuestas con rutas de investigación.
# Reglas: no suman puntos; pueden activar preguntas; una respuesta puede
# generar varios; un metadato puede relacionarse con varias preguntas.
# Metadatos = dirección. Puntos = fuerza de evidencia.

metadatos:
  - nutricion
  - carbohidratos
  - hidratacion
  - sodio
  - sueno
  - recuperacion
  - estres
  - calor
  - pacing
  - intensidad
  - respiracion
  - piernas
  - fatiga-muscular
  - dolor-localizado
  - fondos-largos
  - subidas-largas
  - sprint
  - cambios-de-ritmo
  - fuerza
  - tecnica
  - coordinacion
  - composicion-corporal
  # Oficializados en docs/12 (D3):
  - disponibilidad-energetica
  - durabilidad
  - estrategia-nutricional
  # Indicador HR (D17): se activa solo si el usuario usa pulsómetro
  - pulso
  # Solo la batería de la limitación de pulso (LP008) lo activa; encierra las
  # preguntas de "pulso como queja" (Q070-072) a ese contexto.
  - pulso-alto
  # Lo generan Q074 A/B (sigue plan / entrenador). Sirve para EXCLUIR las
  # preguntas de estructura (Q025, Q062): si ya dijo que tiene plan, no repetir.
  - plan-estructurado

# Regla de crecimiento (D3): un metadato nuevo requiere al menos una pregunta
# que lo genere y al menos una pregunta que se active con él.
