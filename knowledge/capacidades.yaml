# AthleteTrainLab - Capacidades v1.0
# Fuente: docs/04-capacidades.md
# Una capacidad: propiedad fisiológica o neuromuscular desarrollable mediante
# adaptación al entrenamiento, cuya expresión influye en el rendimiento.

capacidades:
  - codigo: C001
    nombre: Capacidad aeróbica
    estado: activa
    definicion: >
      Capacidad del organismo para producir energía mediante el metabolismo
      oxidativo y sostener esfuerzos prolongados con bajo costo fisiológico.
    rol: >
      Sostener esfuerzos largos, tolerar volumen, recuperar mejor y retrasar la fatiga.
    adaptaciones:
      - Mayor volumen sistólico
      - Mayor volumen plasmático
      - Mayor densidad mitocondrial
      - Mayor capilarización
      - Mayor actividad oxidativa
      - Mejor utilización de grasas y carbohidratos
    evidencias:
      - Duración tolerada
      - Respiración
      - RPE
      - Frecuencia cardíaca
      - Potencia
      - Lactato
      - Desacople cardíaco
      - Recuperación entre esfuerzos
    limitaciones_relacionadas:
      - Me fatigo antes de lo esperado
      - Se me cae el ritmo en esfuerzos largos
      - Me falta aire en subidas largas
      - Me cuesta terminar fondos

  - codigo: C002
    nombre: Capacidad glucolítica oxidativa
    estado: activa
    definicion: >
      Capacidad para sostener tasas elevadas de producción energética usando
      carbohidratos con participación glucolítica y oxidativa.
    rol: >
      Clave en esfuerzos moderados-altos y prolongados: FTP, LT2, subidas de
      20-60 minutos, contrarreloj y ritmo de carrera.
    adaptaciones:
      - Mayor oxidación de carbohidratos
      - Mejor aclaramiento de lactato
      - Mayor tolerancia a intensidades cercanas al umbral
      - Mejor estabilidad metabólica
    evidencias:
      - Potencia 10-60 min
      - Lactato a intensidades moderadas-altas
      - RPE elevado sostenido
      - Ardor muscular
      - Caída de ritmo cerca del umbral
    limitaciones_relacionadas:
      - Se me queman las piernas en subidas largas
      - No puedo sostener ritmo fuerte
      - Me caigo en esfuerzos de 20-40 minutos
      - Me cuesta mantener el FTP

  - codigo: C003
    nombre: Capacidad anaeróbica aláctica
    estado: activa
    definicion: >
      Capacidad de producir energía rápidamente mediante ATP-PCr en esfuerzos
      explosivos y muy cortos.
    rol: >
      Explica sprints, arrancadas, cambios de ritmo cortos y respuesta explosiva.
    adaptaciones:
      - Mejor utilización de fosfocreatina
      - Mayor potencia máxima
      - Mejor recuperación entre esfuerzos explosivos
      - Mayor reclutamiento de fibras rápidas
    evidencias:
      - Potencia 5-15 s
      - Sprint
      - Capacidad de acelerar
      - Respuesta a ataques cortos
    limitaciones_relacionadas:
      - No tengo chispa
      - Me cuesta arrancar fuerte
      - Pierdo los sprints

  - codigo: C004
    nombre: Fuerza
    estado: activa
    definicion: >
      Capacidad del sistema neuromuscular para producir tensión contra una resistencia.
    rol: >
      Aplicar torque, tolerar cargas musculares, mejorar producción de potencia
      y reducir fatiga localizada.
    adaptaciones:
      - Mayor fuerza máxima
      - Mejor reclutamiento
      - Mayor rigidez musculotendinosa
      - Mejor tolerancia a esfuerzos de alto torque
    evidencias:
      - Dificultad con baja cadencia
      - Fatiga muscular localizada
      - Historial de fuerza
      - Sensación de falta de fuerza
    limitaciones_relacionadas:
      - Se me cargan mucho los cuádriceps
      - Me cuesta pedalear con baja cadencia
      - Siento que las piernas fallan antes que la respiración

  - codigo: C005
    nombre: Capacidad neuromuscular
    estado: activa
    definicion: >
      Capacidad del sistema nervioso para reclutar, sincronizar y activar
      unidades motoras de forma eficiente.
    rol: >
      Calidad de activación, respuesta a cambios de ritmo, coordinación
      muscular y eficiencia del movimiento.
    adaptaciones:
      - Mejor reclutamiento
      - Mejor sincronización
      - Mayor velocidad de activación
      - Mejor eficiencia de aplicación de fuerza
    evidencias:
      - Cambios de ritmo
      - Cadencia
      - Fluidez del movimiento
      - Pérdida de coordinación bajo fatiga
    limitaciones_relacionadas:
      - Me cuesta responder ataques
      - Siento el pedaleo torpe
      - Pierdo eficiencia cuando me fatigo

# Explícitamente NO son capacidades primarias (son indicadores, factores o emergentes):
no_capacidades:
  - FTP
  - VO2max
  - Durabilidad
  - Economía
  - Rendimiento en subida
  - Nutrición
  - Pacing
  - Técnica
  - Composición corporal
